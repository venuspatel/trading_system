<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>TradeAgent</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif}
    /* Improve card readability on pure black */
    [style*="border:1px solid #1c1c1c"]{border-color:#252525 !important}
    [style*="border-bottom:1px solid #1c1c1c"]{border-bottom-color:#252525 !important}
    [style*="border-bottom:1px solid #111"]{border-bottom-color:#1e1e1e !important}
    /* Ensure labels are always readable */
    .metric-label{color:#999 !important}
    input[type=range]{width:100%;accent-color:#4d9cf8;height:4px}
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
